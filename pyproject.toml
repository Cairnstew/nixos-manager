# Generated by flake.nix — edit in modules/project.nix

[build-system]
build-backend = "uv_build"
requires = ["uv_build>=0.9.0,<0.10.0"]

[dependency-groups]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "pytest-asyncio>=1.3.0"]

[project]
dependencies = [
    "mcp-nixos>=2.4.3",
    "qwen-agent[code-interpreter,gui,mcp,rag]>=0.0.3",
    "soundfile>=0.13.1",
]
description = "Local AI agent for managing NixOS flake configurations"
name = "nixos-manager"
readme = "README.md"
requires-python = ">=3.12"
version = "0.1.0"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[project.scripts]
nixos-manager = "nixos_manager.agent:main"
searchix = "searchix.cli:main"

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.coverage.run]
omit = ["tests/*", "*/conftest.py"]
source = ["tools", "config", "agent"]

[tool.pytest.ini_options]
addopts = ["-v", "--tb=short", "--strict-markers", "-p", "no:warnings"]
markers = ["integration: requires real binaries (git, nix) installed", "slow: takes more than a few seconds"]
python_classes = ["Test*"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
ignore = ["E501"]
select = ["E", "F", "I", "UP"]
