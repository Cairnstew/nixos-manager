# This file is generated by flake.nix — edit projectConfig there.

[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[project]
dependencies = [
    "qwen-agent[code-interpreter,gui,mcp,rag]>=0.0.3",
    "soundfile>=0.13.1",
]
description = "Local AI agent for managing NixOS flake configurations"
name = "nixos-manager"
readme = "README.md"
requires-python = ">=3.12"
version = "0.1.0"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[project.scripts]
nixos-manager = "agent:main"

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.coverage.run]
omit = ["tests/*", "*/conftest.py"]
source = ["tools", "config", "agent"]

[tool.hatch.build.targets.wheel]
packages = ["tools", "config"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.pytest.ini_options]
addopts = ["-v", "--tb=short", "--strict-markers", "-p", "no:warnings"]
markers = ["integration: requires real binaries (git, nix) installed", "slow: takes more than a few seconds"]
python_classes = ["Test*"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
ignore = ["E501"]
select = ["E", "F", "I", "UP"]

[dependency-groups]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]
